services:
  db:
    image: postgres:16
    container_name: escape-room-db
    environment:
      POSTGRES_USER: escape
      POSTGRES_PASSWORD: escape
      POSTGRES_DB: escape_room
    ports:
      - "5432:5432"
    volumes:
      - escape_room_pgdata:/var/lib/postgresql/data

volumes:
  escape_room_pgdata:
